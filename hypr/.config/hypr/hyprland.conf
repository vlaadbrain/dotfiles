# bind = $mainMod, A, exec, $webapp="https://chatgpt.com"
# bind = $mainMod SHIFT, A, exec, $webapp="https://grok.com"
# bind = $mainMod, C, exec, $webapp="https://calendar.google.com/"
# bind = $mainMod, E, exec, $webapp="https://mail.google.com/"
# bind = $mainMod, Y, exec, $webapp="https://youtube.com/"
# bind = $mainMod SHIFT, G, exec, $webapp="https://web.whatsapp.com/"
# bind = $mainMod ALT, G, exec, $webapp="https://messages.google.com/web/conversations"
# bind = $mainMod, X, exec, $webapp="https://x.com/"
# bind = $mainMod SHIFT, X, exec, $webapp="https://x.com/compose/post"

# Extra autostart processes
# exec-once = uwsm app -- my-service

# Extra env variables
# Note: You must relaunch Hyprland after changing envs (use Super+Esc, then Relaunch)
# env = MY_GLOBAL_ENV,setting

# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
  # Use multiple keyboard layouts and switch between them with Alt + Space
  # kb_layout = us,dk
  kb_layout = us
  kb_options = compose:caps # ,grp:alt_space_toggle

  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Increase sensitity for mouse/trackpack (default: 0)
  # sensitivity = 0.35

  touchpad {
    # Use natural (inverse) scrolling
    # natural_scroll = true

    # Use two-finger clicks for right-click instead of lower-right corner
    # clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 0.4
  }
}

device {
  name = at-translated-set-2-keyboard
  kb_options = ctrl:swapcaps
}

animations {
  enabled = no, please :(
}

general {
  layout = master
}

# Scroll faster in the terminal
windowrule = scrolltouchpad 1.5, class:Alacritty
