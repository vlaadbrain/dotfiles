# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# You're encouraged to tailor your Hyprland config in this file by adding or overwriting any settings.
# But don't change anything that lives in ~/.local/share/omarchy, if you can help it!
# Those files are overwritten when Omarchy is updated.

# Change your personal monitor setup in here to keep the main config portable
source = ~/.config/hypr/monitors.conf

$mainMod = SUPER # Sets "Windows" key as main modifier
# Use defaults Omarchy defaults
#source = ~/.local/share/omarchy/default/hypr/autostart.conf
#source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
#source = ~/.local/share/omarchy/default/hypr/bindings/tiling.conf
#source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
#source = ~/.local/share/omarchy/default/hypr/envs.conf
#source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
#source = ~/.local/share/omarchy/default/hypr/input.conf
#source = ~/.local/share/omarchy/default/hypr/windows.conf
#source = ~/.config/omarchy/current/theme/hyprland.conf
#
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

unbind = $mainMod, J
unbind = $mainMod, P
unbind = $mainMod, K
unbind = $mainMod, left
unbind = $mainMod, right
unbind = $mainMod, up
unbind = $mainMod, down
unbind = $mainMod SHIFT, left
unbind = $mainMod SHIFT, right
unbind = $mainMod SHIFT, up
unbind = $mainMod SHIFT, down

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod, W, killactive,
bind = $mainMod SHIFT, Q, exit,

bind = $mainMod, T, togglesplit,

# Application bindings
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"
$terminal = uwsm app -- /home/cjt/bin/st
$browser = uwsm app -- chromium
$chrome  = uwsm app -- chromium
$webapp = $chrome --app

bindl = $mainMod, P, exec, $osdclient --playerctl play-pause
bind = $mainMod SHIFT, return, exec, $terminal
bind = $mainMod, F, exec, uwsm app -- nautilus --new-window
bind = $mainMod, B, exec, $browser
# bind = $mainMod, M, exec, $webapp="https://music.youtube.com"
